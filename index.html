<!DOCTYPE html> <html lang="he" dir="rtl"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title> חידון הידע השבועי</title> <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"> <style> :root { --easy: #2ecc71; --medium: #f39c12; --hard: #e74c3c; --bg: #fff8f0; --text: #1a1a2e; --muted: #888; } * { margin: 0; padding: 0; box-sizing: border-box; } body { background: var(--bg); min-height: 100vh; font-family: 'Heebo', sans-serif; color: var(--text); overflow-x: hidden; } /* zig-zag top border */ body::before { content: ''; display: block; height: 12px; background: linear-gradient(135deg, #ff6b6b 25%, transparent 25%) -10px 0, linear-gradient(225deg, #ff6b6b 25%, transparent 25%) -10px 0, linear-gradient(315deg, #ff6b6b 25%, transparent 25%), linear-gradient(45deg, #ff6b6b 25%, transparent 25%); background-size: 20px 12px; background-color: #ffd93d; } .container { max-width: 700px; margin: 0 auto; padding: 16px 20px 40px; } .screen { display: none; } .screen.active { display: block; animation: fadeIn 0.35s ease; } @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } } /* HEADER */ .logo { text-align: center; padding: 24px 0 20px; } .logo h1 { font-family: 'Heebo', sans-serif; font-size: clamp(2rem, 7vw, 3rem); font-weight: 900; color: var(--text); letter-spacing: -1px; line-height: 1; } .logo h1 .highlight { display: inline-block; background: #ffd93d; padding: 0 8px; border-radius: 6px; color: #1a1a2e; } .logo .subtitle { font-size: 0.9rem; color: var(--muted); margin-top: 8px; font-weight: 500; } /* CARDS */ .card { background: #fff; border: 2.5px solid #1a1a2e; border-radius: 20px; padding: 28px; margin-bottom: 16px; box-shadow: 5px 5px 0 #1a1a2e; } /* LEVEL SELECT */ .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 22px 0 4px; } .level-btn { background: #fff; border: 2.5px solid #1a1a2e; border-radius: 16px; padding: 22px 10px; cursor: pointer; transition: all 0.15s; text-align: center; color: var(--text); font-family: 'Heebo', sans-serif; box-shadow: 4px 4px 0 #1a1a2e; } .level-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; } .level-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; } .level-btn.easy { background: #d4fce8; } .level-btn.medium { background: #fff3cd; } .level-btn.hard { background: #fde8e8; } .level-icon { font-size: 2.2rem; display: block; margin-bottom: 10px; } .level-name { font-weight: 900; font-size: 1.1rem; display: block; } .level-desc { font-size: 0.75rem; color: var(--muted); margin-top: 4px; display: block; font-weight: 500; } /* GAME HEADER */ .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 8px; } .score-badge { background: #ffd93d; border: 2px solid #1a1a2e; border-radius: 50px; padding: 7px 18px; font-weight: 900; font-size: 1rem; color: #1a1a2e; display: flex; align-items: center; gap: 6px; box-shadow: 3px 3px 0 #1a1a2e; } .progress-info { font-size: 0.82rem; color: var(--muted); font-weight: 600; } .level-badge { padding: 5px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; border: 2px solid #1a1a2e; } .level-badge.easy { background: #d4fce8; color: #1a1a2e; } .level-badge.medium { background: #fff3cd; color: #1a1a2e; } .level-badge.hard { background: #fde8e8; color: #1a1a2e; } /* PROGRESS BAR */ .progress-bar { background: #eee; border-radius: 50px; height: 10px; margin-bottom: 22px; overflow: hidden; border: 2px solid #1a1a2e; } .progress-fill { height: 100%; border-radius: 50px; background: #ffd93d; transition: width 0.4s ease; } /* QUESTION */ .question-number { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; } .question-text { font-weight: 800; font-size: clamp(1.2rem, 3.5vw, 1.5rem); line-height: 1.5; margin-bottom: 26px; color: #1a1a2e; } /* ANSWERS */ .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } @media (max-width: 500px) { .answers-grid { grid-template-columns: 1fr; } .level-grid { grid-template-columns: 1fr; } } .answer-btn { background: #fff; border: 2px solid #1a1a2e; border-radius: 12px; padding: 15px 16px; cursor: pointer; text-align: right; color: #1a1a2e; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; transition: all 0.15s; display: flex; align-items: center; gap: 10px; box-shadow: 3px 3px 0 #1a1a2e; line-height: 1.4; } .answer-btn:hover:not(:disabled) { background: #f5f5ff; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #1a1a2e; } .answer-btn:active:not(:disabled) { transform: translate(1px,1px); box-shadow: 2px 2px 0 #1a1a2e; } .answer-btn.correct { background: #d4fce8; border-color: #2ecc71; box-shadow: 3px 3px 0 #2ecc71; animation: correctPulse 0.4s ease; } .answer-btn.wrong { background: #fde8e8; border-color: #e74c3c; box-shadow: 3px 3px 0 #e74c3c; animation: shake 0.35s ease; } .answer-btn.reveal-correct { background: #d4fce8; border-color: #2ecc71; box-shadow: 3px 3px 0 #2ecc71; } .answer-letter { width: 30px; height: 30px; border-radius: 8px; background: #ffd93d; border: 2px solid #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 0.82rem; font-weight: 900; flex-shrink: 0; color: #1a1a2e; } @keyframes correctPulse { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } } @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } } /* FEEDBACK POPUP */ .feedback-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: none; opacity: 0; background: rgba(0,0,0,0.35); transition: opacity 0.2s; } .feedback-overlay.show { opacity: 1; } .feedback-popup { background: #fff; border: 3px solid #1a1a2e; border-radius: 20px; padding: 30px 36px; text-align: center; max-width: 320px; width: 90%; box-shadow: 8px 8px 0 #1a1a2e; animation: popIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275); } @keyframes popIn { from { transform: scale(0.8) rotate(-3deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } } .feedback-icon { font-size: 3rem; display: block; margin-bottom: 10px; } .feedback-title { font-weight: 900; font-size: 1.5rem; color: #1a1a2e; } .feedback-points { font-size: 1.1rem; color: #f39c12; margin-top: 6px; font-weight: 800; } .feedback-explanation { font-size: 0.85rem; color: var(--muted); margin-top: 10px; line-height: 1.6; font-weight: 500; } /* NEXT BTN */ .next-btn { width: 100%; margin-top: 18px; padding: 15px; border: 2.5px solid #1a1a2e; border-radius: 12px; background: #ffd93d; color: #1a1a2e; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.15s; display: none; box-shadow: 4px 4px 0 #1a1a2e; } .next-btn.show { display: block; animation: fadeIn 0.25s ease; } .next-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; } .next-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; } /* RESULTS */ .results-screen .big-score { text-align: center; padding: 16px; } .big-score .number { font-weight: 900; font-size: 5.5rem; color: #1a1a2e; line-height: 1; letter-spacing: -3px; text-shadow: 5px 5px 0 #ffd93d; } .big-score .label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; } .result-emoji { font-size: 3.5rem; display: block; margin: 16px 0 8px; text-align: center; } .result-msg { text-align: center; font-weight: 900; font-size: 1.5rem; margin-bottom: 6px; color: #1a1a2e; } .result-sub { text-align: center; color: var(--muted); font-size: 0.9rem; font-weight: 500; } .results-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 22px 0; text-align: center; } .stat-box { background: #fff; border: 2px solid #1a1a2e; border-radius: 12px; padding: 14px 8px; box-shadow: 3px 3px 0 #1a1a2e; } .stat-box .n { font-weight: 900; font-size: 1.8rem; color: #1a1a2e; } .stat-box .l { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-weight: 600; } .btn-primary { width: 100%; padding: 15px; border: 2.5px solid #1a1a2e; border-radius: 12px; background: #ffd93d; color: #1a1a2e; font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; box-shadow: 4px 4px 0 #1a1a2e; } .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; } .btn-primary:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; } .btn-secondary { width: 100%; padding: 13px; border: 2px solid #ccc; border-radius: 12px; background: #fff; color: #1a1a2e; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; } .btn-secondary:hover { border-color: #1a1a2e; background: #f9f9f9; } /* ADMIN LINK */ .admin-link { text-align: center; margin-top: 28px; padding-bottom: 20px; } .admin-link button { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.72rem; font-family: 'Heebo', sans-serif; } .admin-link button:hover { color: #999; } /* ADMIN PANEL */ .form-group { margin-bottom: 16px; } .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; } .form-group input, .form-group select, .form-group textarea { width: 100%; background: #fff; border: 2px solid #ddd; border-radius: 10px; padding: 11px 14px; color: #1a1a2e; font-family: 'Heebo', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.15s; direction: rtl; } .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1a1a2e; } .form-group textarea { resize: vertical; min-height: 75px; } .form-group select option { background: #fff; } .answers-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; } @media (max-width: 500px) { .answers-inputs { grid-template-columns: 1fr; } } .correct-select { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; } .correct-select label { display: flex; align-items: center; gap: 6px; background: #fff; border: 2px solid #ddd; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 0.88rem; color: #1a1a2e; font-weight: 700; transition: border-color 0.15s; } .correct-select label:hover { border-color: #1a1a2e; } .correct-select input[type="radio"] { accent-color: #ffd93d; } .success-toast { position: fixed; bottom: 28px; right: 50%; transform: translateX(50%); background: #2ecc71; color: #fff; padding: 12px 24px; border-radius: 50px; font-weight: 800; font-family: 'Heebo', sans-serif; font-size: 0.9rem; z-index: 999; border: 2px solid #1a1a2e; box-shadow: 4px 4px 0 #1a1a2e; display: none; } .questions-list { max-height: 320px; overflow-y: auto; padding-right: 3px; } .q-item { background: #fff; border: 2px solid #eee; border-radius: 10px; padding: 11px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; } .q-item .q-text { font-size: 0.88rem; flex: 1; line-height: 1.4; font-weight: 600; color: #1a1a2e; } .q-item .q-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; } .del-btn { background: #fff; border: 2px solid #ddd; border-radius: 7px; color: #999; padding: 4px 10px; cursor: pointer; font-size: 0.78rem; font-family: 'Heebo', sans-serif; flex-shrink: 0; font-weight: 700; transition: all 0.15s; } .del-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fde8e8; } .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 0; } .tab-btn { padding: 9px 16px; border: none; border-bottom: 3px solid transparent; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 700; transition: all 0.15s; margin-bottom: -2px; } .tab-btn.active { color: #1a1a2e; border-bottom-color: #ffd93d; } .tab-btn:hover { color: #1a1a2e; } /* CONFETTI */ .confetti-piece { position: fixed; width: 9px; height: 9px; top: -10px; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; z-index: 200; } @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } } .points-pop { position: fixed; font-weight: 900; font-size: 2rem; color: #f39c12; pointer-events: none; z-index: 150; animation: pointsPop 0.9s ease forwards; -webkit-text-stroke: 1px #1a1a2e; } @keyframes pointsPop { 0% { opacity: 0; transform: translateY(0) scale(0.6); } 30% { opacity: 1; transform: translateY(-18px) scale(1.15); } 100% { opacity: 0; transform: translateY(-70px) scale(1); } } ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; } </style> </head> <body> <div class="container"> <!-- HOME SCREEN --> <div class="screen active" id="screen-home"> <div class="logo"> <h1><span class="highlight">חידון</span> הידע</h1> <p class="subtitle">20 שאלות • 3 רמות קושי</p> </div> <div class="card"> <h2 style="font-weight:900; font-size:1.4rem; text-align:center; margin-bottom:5px;">בחר רמת קושי </h2> <p style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.9rem; margin-bottom:5px;">20 שאלות מאתגרות מחכות לך!</p> <div class="level-grid"> <button class="level-btn easy" onclick="startGame('easy')"> <span class="level-icon"></span> <span class="level-name">קל</span> <span class="level-desc">מושלם למתחילים</span> </button> <button class="level-btn medium" onclick="startGame('medium')"> <span class="level-icon"></span> <span class="level-name">בינוני</span> <span class="level-desc">לאלה שיודעים</span> </button> <button class="level-btn hard" onclick="startGame('hard')"> <span class="level-icon"></span> <span class="level-name">קשה</span> <span class="level-desc">לגאונים בלבד!</span> </button> </div> </div> <div class="admin-link"> <button onclick="showAdminLogin()">️ ניהול</button> </div> </div> <!-- GAME SCREEN --> <div class="screen" id="screen-game"> <div class="logo"> <h1 style="font-size:1.5rem;"><span class="highlight">חידון</span> הידע</h1> </div> <div class="game-header"> <div class="score-badge"><span id="score-display">0</span></div> <span class="level-badge" id="level-badge">קל</span> <span class="progress-info" id="progress-info">שאלה 1 מתוך 20</span> </div> <div class="progress-bar"> <div class="progress-fill" id="progress-fill" style="width:0%"></div> </div> <div class="card" id="question-card"> <div class="question-number" id="q-number">שאלה 1</div> <div class="question-text" id="q-text">...טוען</div> <div class="answers-grid" id="answers-grid"></div> <button class="next-btn" id="next-btn" onclick="nextQuestion()">שאלה הבאה ←</button> </div> </div> <!-- RESULTS SCREEN --> <div class="screen" id="screen-results"> <div class="logo"> <h1 style="font-size:1.5rem;"><span class="highlight">תוצאות</span></h1> </div> <div class="card results-screen"> <div class="big-score"> <div class="number" id="final-score">0</div> <div class="label">נקודות</div> </div> <span class="result-emoji" id="result-emoji"></span> <div class="result-msg" id="result-msg">כל הכבוד!</div> <div class="result-sub" id="result-sub">תוצאה מעולה</div> <div class="results-stats"> <div class="stat-box"> <div class="n" id="stat-correct">0</div> <div class="l"> נכון</div> </div> <div class="stat-box"> <div class="n" id="stat-wrong">0</div> <div class="l"> שגוי</div> </div> <div class="stat-box"> <div class="n" id="stat-pct">0%</div> <div class="l"> דיוק</div> </div> </div> <button class="btn-primary" onclick="startGame(currentLevel)"> שחק שוב</button> <button class="btn-secondary" onclick="showScreen('screen-home')"> בחר רמה</button> </div> </div> <!-- ADMIN LOGIN --> <div class="screen" id="screen-admin-login"> <div class="logo"> <h1 style="font-size:1.5rem;">כניסת מנהל </h1> </div> <div class="card"> <div class="form-group"> <label>סיסמה</label> <input type="password" id="admin-pw" placeholder="הכנס סיסמה..." onkeyup="if(event.key==='Enter')checkAdminLogin()"> </div> <button class="btn-primary" onclick="checkAdminLogin()">כניסה</button> <button class="btn-secondary" onclick="showScreen('screen-home')">חזרה</button> </div> </div> <!-- ADMIN PANEL --> <div class="screen" id="screen-admin"> <div class="logo"> <h1 style="font-size:1.5rem;">פאנל ניהול ️</h1> </div> <div class="card"> <div class="tabs"> <button class="tab-btn active" onclick="showAdminTab('add')"> הוסף שאלה</button> <button class="tab-btn" onclick="showAdminTab('list')"> רשימת שאלות</button> </div> <!-- ADD QUESTION --> <div id="tab-add"> <div class="form-group"> <label>רמת קושי</label> <select id="q-level"> <option value="easy"> קל</option> <option value="medium"> בינוני</option> <option value="hard"> קשה</option> </select> </div> <div class="form-group"> <label>השאלה</label> <textarea id="q-input" placeholder="כתוב את השאלה כאן..."></textarea> </div> <div class="form-group"> <label>4 תשובות</label> <div class="answers-inputs"> <input type="text" id="a1" placeholder="תשובה א"> <input type="text" id="a2" placeholder="תשובה ב"> <input type="text" id="a3" placeholder="תשובה ג"> <input type="text" id="a4" placeholder="תשובה ד"> </div> </div> <div class="form-group"> <label>תשובה נכונה</label> <div class="correct-select"> <label><input type="radio" name="correct" value="0"> א</label> <label><input type="radio" name="correct" value="1"> ב</label> <label><input type="radio" name="correct" value="2"> ג</label> <label><input type="radio" name="correct" value="3"> ד</label> </div> </div> <div class="form-group"> <label>הסבר (אופציונלי)</label> <input type="text" id="q-exp" placeholder="הסבר קצר לתשובה הנכונה..."> </div> <button class="btn-primary" onclick="addQuestion()"> הוסף שאלה</button> </div> <!-- LIST QUESTIONS --> <div id="tab-list" style="display:none"> <div class="form-group"> <select id="filter-level" onchange="renderQuestionsList()"> <option value="all">כל הרמות</option> <option value="easy"> קל</option> <option value="medium"> בינוני</option> <option value="hard"> קשה</option> </select> </div> <div class="questions-list" id="questions-list"></div> </div> <button class="btn-secondary" onclick="showScreen('screen-home')" style="margin-top:15px;"> חזרה לדף הבית</button> </div> </div> </div> <!-- Feedback overlay --> <div class="feedback-overlay" id="feedback-overlay"> <div class="feedback-popup"> <span class="feedback-icon" id="fb-icon"></span> <div class="feedback-title" id="fb-title">נכון!</div> <div class="feedback-points" id="fb-points">+100 נקודות</div> <div class="feedback-explanation" id="fb-exp"></div> </div> </div> <!-- Toast --> <div class="success-toast" id="toast"> השאלה נוספה בהצלחה!</div> <script> // ============= DEFAULT QUESTIONS ============= const defaultQuestions = { easy: [ { q: "מה הצבע של עשב?", a: ["ירוק","כחול","אדום","צהוב"], c: 0, exp: "עשב ירוק בגלל הכלורופיל שבו!" }, { q: "כמה ימים יש בשבוע?", a: ["5","6","7","8"], c: 2, exp: "שבוע מורכב מ-7 ימים" }, { q: "מה הוא החיה הכי גדולה ביבשה?", a: ["ג'ירפה","פיל","היפופוטם","קרנף"], c: 1, exp: "הפיל האפריקאי הוא בעל החיים הגדול ביותר ביבשה!" }, { q: "כמה ציפרות יש בספרה מיליון?", a: ["5","6","7","8"], c: 2, exp: "מיליון = 1,000,000 - שבע ספרות" }, { q: "מה בירת ישראל?", a: ["תל אביב","חיפה","ירושלים","באר שבע"], c: 2, exp: "ירושלים היא בירת מדינת ישראל" }, { q: "כמה רגליים לעכביש?", a: ["6","8","10","4"], c: 1, exp: "לעכביש 8 רגליים - לכן הוא לא חרק!" }, { q: "מה הצבעים של דגל ישראל?", a: ["אדום ולבן","כחול ולבן","כחול ואדום","ירוק ולבן"], c: 1, exp: "דגל ישראל כחול ולבן עם מגן דוד" }, { q: "כמה חודשים יש בשנה?", a: ["10","11","12","13"], c: 2, exp: "12 חודשים - מינואר עד דצמבר" }, { q: "מה הפלנטה הקרובה ביותר לשמש?", a: ["ונוס","כדור הארץ","מאדים","מרקורי"], c: 3, exp: "מרקורי היא הפלנטה הקרובה ביותר לשמש!" }, { q: "כמה צלעות למשולש?", a: ["2","3","4","5"], c: 1, exp: "משולש = 3 צלעות. מש-ולש = שלוש!" }, { q: "מהו הים הגדול ביותר בעולם?", a: ["האוקיינוס ההודי","הים התיכון","האוקיינוס האטלנטי","האוקיינוס השקט"], c: 3, exp: "האוקיינוס השקט הוא הגדול ביותר - כמחצית מהמים בכדור הארץ!" }, { q: "מה הצבע שנוצר מעירוב צהוב וכחול?", a: ["כתום","סגול","ירוק","חום"], c: 2, exp: "צהוב + כחול = ירוק" }, { q: "כמה שניות בדקה?", a: ["30","60","90","100"], c: 1, exp: "60 שניות = דקה אחת" }, { q: "מי כתב את 'הארי פוטר'?", a: ["רוקסן","ג'יי קיי רולינג","ג'ורג' מרטין","ג'יי אר טולקין"], c: 1, exp: "ג'יי קיי רולינג כתבה את סדרת הארי פוטר!" }, { q: "כמה שיניים לאדם בוגר?", a: ["28","30","32","36"], c: 2, exp: "לאדם בוגר יש 32 שיניים כולל שיני בינה" }, { q: "מה הלשון הרשמית בספרד?", a: ["פורטוגזית","צרפתית","ספרדית","איטלקית"], c: 2, exp: "בספרד מדברים ספרדית (קסטיליאנית)" }, { q: "כמה רגליים לחרק?", a: ["4","6","8","10"], c: 1, exp: "לכל החרקים 6 רגליים - זה אחד המאפיינים שלהם!" }, { q: "איזו כוכב הכי קרוב לכדור הארץ?", a: ["הירח","מאדים","השמש","פרוקסימה קנטאורי"], c: 2, exp: "השמש! היא כוכב שנמצא ממש קרוב אלינו יחסית" }, { q: "מה הצבע שנוצר מעירוב אדום ולבן?", a: ["כתום","ורוד","סגול","כחול"], c: 1, exp: "אדום + לבן = ורוד" }, { q: "כמה צלעות לריבוע?", a: ["3","4","5","6"], c: 1, exp: "לריבוע יש 4 צלעות שוות" } ], medium: [ { q: "מי צייר את 'המונה ליזה'?", a: ["מיכלאנג'לו","לאונרדו דה וינצ'י","רפאל","בוטיצ'לי"], c: 1, exp: "לאונרדו דה וינצ'י צייר את המונה ליזה בין 1503-1519" }, { q: "מה הכוח שמחזיק כוכבי לכת במסלולם סביב השמש?", a: ["מגנטיות","הכוח החשמלי","הכבידה","הרוח"], c: 2, exp: "כוח הכבידה של השמש שומר על הכוכבים במסלולם!" }, { q: "כמה ארצות הברית נצטרפו לאיחוד בתחילתו?", a: ["7","13","15","20"], c: 1, exp: "13 המושבות המקוריות הפכו ל-13 מדינות ראשונות ב-1776" }, { q: "מה הסמל הכימי של הזהב?", a: ["Gd","Go","Au","Ag"], c: 2, exp: "Au מגיעה מהלטינית Aurum שמשמעותה זהב" }, { q: "מה מייצר הכלורופיל בצמחים?", a: ["חמצן בלבד","מים","סוכר בעזרת אור שמש","חנקן"], c: 2, exp: "פוטוסינתזה: האור + מים + CO₂ = סוכר + חמצן" }, { q: "כמה ספרים יש בברית החדשה?", a: ["20","27","30","39"], c: 1, exp: "ברית חדשה מכילה 27 ספרים" }, { q: "מי גילה את אמריקה ב-1492?", a: ["פרדינד מגלן","ג'ון קבוט","ואסקו דה גמה","כריסטופר קולומבוס"], c: 3, exp: "קולומבוס הגיע לאמריקה ב-1492 במסעו לחפש דרך להודו" }, { q: "מהו הגז הנפוץ ביותר באטמוספרה של כדור הארץ?", a: ["חמצן","פחמן דו-חמצני","ארגון","חנקן"], c: 3, exp: "כ-78% מהאוויר הוא חנקן! רק 21% חמצן" }, { q: "מי כתב את 'רומיאו ויוליה'?", a: ["צ'וסר","שייקספיר","מרלו","מילטון"], c: 1, exp: "ויליאם שייקספיר כתב את המחזה המפורסם בסוף המאה ה-16" }, { q: "מה היא המדינה הגדולה ביותר בעולם בשטחה?", a: ["קנדה","סין","ארצות הברית","רוסיה"], c: 3, exp: "רוסיה היא הגדולה ביותר - כ-17 מיליון קמ\"ר!" }, { q: "כמה ממדים יש למוצק גיאומטרי?", a: ["1","2","3","4"], c: 2, exp: "מוצק הוא תלת-ממדי - אורך, רוחב, גובה" }, { q: "מה הסמל הכימי של מים?", a: ["HO","H₂O","OH₂","2HO"], c: 1, exp: "H₂O = שני אטומי מימן ואטום חמצן אחד" }, { q: "כמה עצמות יש בגוף האדם הבוגר?", a: ["186","206","226","256"], c: 1, exp: "206 עצמות - תינוק נולד עם 270 שמתאחות בהדרגה!" }, { q: "מה הפלנטה הגדולה ביותר במערכת השמש?", a: ["שבתאי","נפטון","צדק","אורנוס"], c: 2, exp: "צדק ענק - פי 1300 מכדור הארץ בנפח!" }, { q: "מי הומצא מנוע הקיטור?", a: ["ניוטון","פרדיי","ג'יימס ווט","אדיסון"], c: 2, exp: "ג'יימס ווט שיפר את מנוע הקיטור ב-1769 ושינה את העולם" }, { q: "מה הים המלוח ביותר בעולם?", a: ["הים הכספי","הים המת","הים האדום","הים הסרדי"], c: 1, exp: "הים המת - כ-33% מלח! אי אפשר לשקוע בו" }, { q: "כמה לב לאוקטופוס?", a: ["1","2","3","4"], c: 2, exp: "לאוקטופוס 3 לבבות! שניים לזימים ואחד לגוף" }, { q: "מה המספר הראשוני הגדול ביותר עד 20?", a: ["17","18","19","20"], c: 2, exp: "19 הוא ראשוני - מתחלק רק ב-1 ובעצמו" }, { q: "איזו שפה מדוברת בברזיל?", a: ["ספרדית","פורטוגזית","ברזילית","צרפתית"], c: 1, exp: "בברזיל מדברים פורטוגזית - היא המושבה של פורטוגל" }, { q: "מה הצבע שנוצר מעירוב אדום, כחול וצהוב?", a: ["חום","כתום","שחור","אפור"], c: 0, exp: "שלושת הצבעים הראשוניים ביחד יוצרים חום-אפרפר" } ], hard: [ { q: "מה הטמפרטורה בה רותח מים בגובה של 3,000 מטר מעל פני הים?", a: ["90°C","100°C","95°C","88°C"], c: 0, exp: "בגובה רב הלחץ נמוך יותר ולכן המים רותחים ב-90°C בלבד!" }, { q: "כמה נוירונים יש בגוף האדם?", a: ["100 מיליון","1 מיליארד","86 מיליארד","1 טריליון"], c: 2, exp: "המוח האנושי מכיל כ-86 מיליארד נוירונים!" }, { q: "מה הקוטר של כדור הארץ בק\"מ?", a: ["6,371","12,742","40,075","9,500"], c: 1, exp: "קוטר כדור הארץ הוא 12,742 ק\"מ (רדיוס = 6,371)" }, { q: "מי פיתח את תורת היחסות הכללית?", a: ["ניוטון","מקסוול","איינשטיין","בוהר"], c: 2, exp: "אלברט איינשטיין פרסם את תורת היחסות הכללית ב-1915" }, { q: "כמה ממדים מניחה תיאוריית המיתרים?", a: ["4","7","10","11"], c: 3, exp: "תיאוריית המיתרים מניחה 11 ממדים!" }, { q: "מהו המספר שנקרא 'קבוע אוילר'?", a: ["π≈3.14","e≈2.718","φ≈1.618","√2≈1.414"], c: 1, exp: "e≈2.71828... הוא קבוע אוילר, בסיס הלוגריתם הטבעי" }, { q: "מה קבע משפט פיתגורס?", a: ["a²+b²=c²","a+b=c","2πr","a×b=c²"], c: 0, exp: "a²+b²=c²: סכום ריבועי הניצבים = ריבוע היתר" }, { q: "כמה כרומוזומים לתא אנושי רגיל?", a: ["23","44","46","48"], c: 2, exp: "46 כרומוזומים = 23 זוגות. תאי מין מכילים 23 בלבד" }, { q: "מה הפרוטוקול המשמש לשליחת דוא\"ל?", a: ["HTTP","FTP","SMTP","SSH"], c: 2, exp: "SMTP (Simple Mail Transfer Protocol) משמש לשליחת מיילים" }, { q: "מי הגה את עקרון אי-הוודאות?", a: ["שרדינגר","בוהר","הייזנברג","פאולי"], c: 2, exp: "ורנר הייזנברג הגה ב-1927 שלא ניתן לדעת בדיוק מיקום ומומנטום בו-זמנית" }, { q: "מה הנוסחה לאנרגיה קינטית?", a: ["E=mc²","E=½mv²","F=ma","P=mv"], c: 1, exp: "אנרגיה קינטית = חצי × מסה × מהירות בריבוע" }, { q: "באיזו שנה נפלה חומת ברלין?", a: ["1987","1989","1991","1993"], c: 1, exp: "חומת ברלין נפלה ב-9 בנובמבר 1989 - מאורע היסטורי!" }, { q: "מה הוא 'המספר הזהב' (phi)?", a: ["1.414","1.618","1.732","2.718"], c: 1, exp: "φ≈1.618... מופיע בטבע, אמנות ואדריכלות לאורך ההיסטוריה" }, { q: "כמה עצמות בגולגולת האדם?", a: ["8","22","29","34"], c: 2, exp: "בגולגולת יש 29 עצמות, 8 מהן מגינות על המוח" }, { q: "מה גל DNA מורכב ממנו?", a: ["חלבונים","נוקלאוטידים","אמינו-חומצות","ליפידים"], c: 1, exp: "DNA מורכב מ-4 סוגי נוקלאוטידים: A, T, G, C" }, { q: "בת כמה שנים היה מוצרט כשהלחין לראשונה?", a: ["3","5","7","10"], c: 1, exp: "מוצרט הלחין את יצירתו הראשונה בגיל 5! גאון מוזיקלי!" }, { q: "מהו חוק בויל בפיזיקה?", a: ["P×V=קבוע","F=ma","E=mc²","PV=nRT"], c: 0, exp: "חוק בויל: לחץ × נפח = קבוע (בטמפרטורה קבועה)" }, { q: "כמה אחים היו לנפוליאון בונפרטה?", a: ["2","4","6","7"], c: 1, exp: "לנפוליאון היו 4 אחים ו-3 אחיות - משפחה גדולה!" }, { q: "מה מודד 'מספר אבוגדרו'?", a: ["מולקולות למול","אנרגיה בג'אול","מסה בגרם","טמפרטורה"], c: 0, exp: "6.022×10²³ חלקיקים (אטומים/מולקולות) למול אחד" }, { q: "איזו קבוצת דם נקראת 'תורם אוניברסלי'?", a: ["A+","AB+","O-","O+"], c: 2, exp: "O- יכולה להינתן לכל אחד ללא התאמת סוג דם!" } ] }; // ============= STATE ============= let questions = JSON.parse(localStorage.getItem('triviaQuestions')) || JSON.parse(JSON.stringify(defaultQuestions)); let currentLevel = 'easy'; let currentQuestions = []; let currentIndex = 0; let score = 0; let correctCount = 0; let wrongCount = 0; let answered = false; const POINTS = { easy: 100, medium: 200, hard: 350 }; function saveQuestions() { localStorage.setItem('triviaQuestions', JSON.stringify(questions)); } // ============= SCREENS ============= function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0, 0); } // ============= GAME ============= function startGame(level) { currentLevel = level; score = 0; correctCount = 0; wrongCount = 0; currentIndex = 0; // Shuffle & pick 20 let pool = [...questions[level]]; pool.sort(() => Math.random() - 0.5); currentQuestions = pool.slice(0, Math.min(20, pool.length)); if (currentQuestions.length === 0) { alert('אין שאלות ברמה זו! הוסף שאלות בפאנל הניהול.'); return; } updateLevelBadge(); showScreen('screen-game'); renderQuestion(); } function updateLevelBadge() { const badge = document.getElementById('level-badge'); const names = { easy: ' קל', medium: ' בינוני', hard: ' קשה' }; badge.textContent = names[currentLevel]; badge.className = 'level-badge ' + currentLevel; } function renderQuestion() { if (currentIndex >= currentQuestions.length) { showResults(); return; } answered = false; const q = currentQuestions[currentIndex]; const total = currentQuestions.length; document.getElementById('q-number').textContent = שאלה ${currentIndex + 1}; document.getElementById('q-text').textContent = q.q; document.getElementById('progress-info').textContent = שאלה ${currentIndex + 1} מתוך ${total}; document.getElementById('progress-fill').style.width = ((currentIndex / total) * 100) + '%'; document.getElementById('score-display').textContent = score; document.getElementById('next-btn').classList.remove('show'); const letters = ['א', 'ב', 'ג', 'ד']; const grid = document.getElementById('answers-grid'); grid.innerHTML = ''; // Shuffle answers let indices = [0,1,2,3]; indices.sort(() => Math.random() - 0.5); const correctLetter = indices.indexOf(q.c); indices.forEach((origIdx, displayIdx) => { const btn = document.createElement('button'); btn.className = 'answer-btn'; btn.innerHTML = <span class="answer-letter">${letters[displayIdx]}</span>${q.a[origIdx]}; btn.onclick = () => handleAnswer(btn, origIdx === q.c, q, correctLetter, displayIdx); grid.appendChild(btn); }); } function handleAnswer(btn, isCorrect, q, correctDisplayIdx, clickedIdx) { if (answered) return; answered = true; const btns = document.querySelectorAll('.answer-btn'); btns.forEach(b => b.disabled = true); if (isCorrect) { btn.classList.add('correct'); score += POINTS[currentLevel]; correctCount++; showFeedback(true, POINTS[currentLevel], q.exp); } else { btn.classList.add('wrong'); btns[correctDisplayIdx].classList.add('reveal-correct'); wrongCount++; showFeedback(false, 0, q.exp); } document.getElementById('score-display').textContent = score; document.getElementById('next-btn').classList.add('show'); } function showFeedback(correct, pts, explanation) { const overlay = document.getElementById('feedback-overlay'); document.getElementById('fb-icon').textContent = correct ? '' : ''; document.getElementById('fb-title').textContent = correct ? 'כל הכבוד!' : 'לא נכון...'; document.getElementById('fb-points').textContent = correct ? +${pts} נקודות : 'לא קיבלת נקודות'; document.getElementById('fb-exp').textContent = explanation || ''; overlay.classList.add('show'); overlay.style.pointerEvents = 'all'; overlay.onclick = () => { overlay.classList.remove('show'); overlay.style.pointerEvents = 'none'; }; // Show points pop if (correct) { const pop = document.createElement('div'); pop.className = 'points-pop'; pop.textContent = +${pts}; pop.style.top = '40%'; pop.style.right = '50%'; pop.style.transform = 'translateX(50%)'; document.body.appendChild(pop); setTimeout(() => pop.remove(), 1000); } setTimeout(() => { overlay.classList.remove('show'); overlay.style.pointerEvents = 'none'; }, 1500); } function nextQuestion() { currentIndex++; renderQuestion(); } function showResults() { const total = currentQuestions.length; const pct = Math.round((correctCount / total) * 100); document.getElementById('final-score').textContent = score; document.getElementById('stat-correct').textContent = correctCount; document.getElementById('stat-wrong').textContent = wrongCount; document.getElementById('stat-pct').textContent = pct + '%'; let emoji, msg, sub; if (pct >= 90) { emoji = ''; msg = 'גאון מוחלט!'; sub = 'תוצאה מדהימה - אתה אמיתי!'; } else if (pct >= 70) { emoji = ''; msg = 'כל הכבוד!'; sub = 'תוצאה מצוינת, כמעט שם!'; } else if (pct >= 50) { emoji = ''; msg = 'לא רע!'; sub = 'אפשר להשתפר עוד קצת'; } else { emoji = ''; msg = 'נסה שוב!'; sub = 'קרא ולמד - בפעם הבאה תהיה מוכן יותר'; } document.getElementById('result-emoji').textContent = emoji; document.getElementById('result-msg').textContent = msg; document.getElementById('result-sub').textContent = sub; showScreen('screen-results'); if (pct >= 70) launchConfetti(); } // ============= CONFETTI ============= function launchConfetti() { const colors = ['#ffd700','#ff6b6b','#a29bfe','#00c896','#ff9f43']; for (let i = 0; i < 60; i++) { setTimeout(() => { const c = document.createElement('div'); c.className = 'confetti-piece'; c.style.left = Math.random() * 100 + 'vw'; c.style.background = colors[Math.floor(Math.random() * colors.length)]; c.style.width = (Math.random() * 8 + 6) + 'px'; c.style.height = (Math.random() * 8 + 6) + 'px'; c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px'; c.style.animationDuration = (Math.random() * 2 + 2) + 's'; c.style.animationDelay = (Math.random() * 0.5) + 's'; document.body.appendChild(c); setTimeout(() => c.remove(), 4000); }, i * 30); } } // ============= ADMIN ============= function showAdminLogin() { document.getElementById('admin-pw').value = ''; showScreen('screen-admin-login'); } function checkAdminLogin() { const pw = document.getElementById('admin-pw').value; if (pw === '12092013') { showScreen('screen-admin'); showAdminTab('add'); } else { document.getElementById('admin-pw').style.borderColor = '#ff4757'; document.getElementById('admin-pw').placeholder = 'סיסמה שגויה!'; setTimeout(() => { document.getElementById('admin-pw').style.borderColor = ''; document.getElementById('admin-pw').placeholder = 'הכנס סיסמה...'; }, 1500); } } function showAdminTab(tab) { document.querySelectorAll('.tab-btn').forEach((b, i) => { b.classList.toggle('active', (i === 0 && tab === 'add') || (i === 1 && tab === 'list')); }); document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none'; document.getElementById('tab-list').style.display = tab === 'list' ? 'block' : 'none'; if (tab === 'list') renderQuestionsList(); } function addQuestion() { const level = document.getElementById('q-level').value; const qText = document.getElementById('q-input').value.trim(); const a1 = document.getElementById('a1').value.trim(); const a2 = document.getElementById('a2').value.trim(); const a3 = document.getElementById('a3').value.trim(); const a4 = document.getElementById('a4').value.trim(); const correct = document.querySelector('input[name="correct"]:checked'); const exp = document.getElementById('q-exp').value.trim(); if (!qText || !a1 || !a2 || !a3 || !a4 || !correct) { alert('מלא את כל השדות!'); return; } questions[level].push({ q: qText, a: [a1, a2, a3, a4], c: parseInt(correct.value), exp }); saveQuestions(); // Reset document.getElementById('q-input').value = ''; document.getElementById('a1').value = ''; document.getElementById('a2').value = ''; document.getElementById('a3').value = ''; document.getElementById('a4').value = ''; document.getElementById('q-exp').value = ''; document.querySelectorAll('input[name="correct"]').forEach(r => r.checked = false); const toast = document.getElementById('toast'); toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2000); } function renderQuestionsList() { const filter = document.getElementById('filter-level').value; const list = document.getElementById('questions-list'); list.innerHTML = ''; const levelNames = { easy: ' קל', medium: ' בינוני', hard: ' קשה' }; const levels = filter === 'all' ? ['easy','medium','hard'] : [filter]; let total = 0; levels.forEach(lv => { questions[lv].forEach((q, idx) => { total++; const div = document.createElement('div'); div.className = 'q-item'; const info = document.createElement('div'); const qTextEl = document.createElement('div'); qTextEl.className = 'q-text'; qTextEl.textContent = q.q; const qMeta = document.createElement('div'); qMeta.className = 'q-meta'; qMeta.textContent = levelNames[lv] + ' • ' + q.a[q.c]; info.appendChild(qTextEl); info.appendChild(qMeta); const delBtn = document.createElement('button'); delBtn.className = 'del-btn'; delBtn.textContent = 'מחק'; // capture lv and idx in closure (function(capturedLevel, capturedIdx) { delBtn.onclick = function() { if (!confirm('האם למחוק את השאלה?')) return; questions[capturedLevel].splice(capturedIdx, 1); saveQuestions(); renderQuestionsList(); }; })(lv, idx); div.appendChild(info); div.appendChild(delBtn); list.appendChild(div); }); }); if (total === 0) { list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.3);padding:20px;">אין שאלות ברמה זו</p>'; } } </script> </body> </html>
