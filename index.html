<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> חידון הידע השבועי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 :root {
 --easy: #2ecc71;
 --medium: #f39c12;
 --hard: #e74c3c;
 --bg: #fff8f0;
 --text: #1a1a2e;
 --muted: #888;
 }

 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 background: var(--bg);
 min-height: 100vh;
 font-family: 'Heebo', sans-serif;
 color: var(--text);
 overflow-x: hidden;
 }

 /* zig-zag top border */
 body::before {
 content: '';
 display: block;
 height: 12px;
 background:
 linear-gradient(135deg, #ff6b6b 25%, transparent 25%) -10px 0,
 linear-gradient(225deg, #ff6b6b 25%, transparent 25%) -10px 0,
 linear-gradient(315deg, #ff6b6b 25%, transparent 25%),
 linear-gradient(45deg, #ff6b6b 25%, transparent 25%);
 background-size: 20px 12px;
 background-color: #ffd93d;
 }

 .container {
 max-width: 700px;
 margin: 0 auto;
 padding: 16px 20px 40px;
 }

 .screen { display: none; }
 .screen.active { display: block; animation: fadeIn 0.35s ease; }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(14px); }
 to { opacity: 1; transform: translateY(0); }
 }

 /* HEADER */
 .logo {
 text-align: center;
 padding: 24px 0 20px;
 }
 .logo h1 {
 font-family: 'Heebo', sans-serif;
 font-size: clamp(2rem, 7vw, 3rem);
 font-weight: 900;
 color: var(--text);
 letter-spacing: -1px;
 line-height: 1;
 }
 .logo h1 .highlight {
 display: inline-block;
 background: #ffd93d;
 padding: 0 8px;
 border-radius: 6px;
 color: #1a1a2e;
 }
 .logo .subtitle {
 font-size: 0.9rem;
 color: var(--muted);
 margin-top: 8px;
 font-weight: 500;
 }

 /* CARDS */
 .card {
 background: #fff;
 border: 2.5px solid #1a1a2e;
 border-radius: 20px;
 padding: 28px;
 margin-bottom: 16px;
 box-shadow: 5px 5px 0 #1a1a2e;
 }

 /* LEVEL SELECT */
 .level-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 14px;
 margin: 22px 0 4px;
 }

 .level-btn {
 background: #fff;
 border: 2.5px solid #1a1a2e;
 border-radius: 16px;
 padding: 22px 10px;
 cursor: pointer;
 transition: all 0.15s;
 text-align: center;
 color: var(--text);
 font-family: 'Heebo', sans-serif;
 box-shadow: 4px 4px 0 #1a1a2e;
 }
 .level-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; }
 .level-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; }
 .level-btn.easy { background: #d4fce8; }
 .level-btn.medium { background: #fff3cd; }
 .level-btn.hard { background: #fde8e8; }

 .level-icon { font-size: 2.2rem; display: block; margin-bottom: 10px; }
 .level-name { font-weight: 900; font-size: 1.1rem; display: block; }
 .level-desc { font-size: 0.75rem; color: var(--muted); margin-top: 4px; display: block; font-weight: 500; }

 /* GAME HEADER */
 .game-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 margin-bottom: 18px;
 flex-wrap: wrap;
 gap: 8px;
 }

 .score-badge {
 background: #ffd93d;
 border: 2px solid #1a1a2e;
 border-radius: 50px;
 padding: 7px 18px;
 font-weight: 900;
 font-size: 1rem;
 color: #1a1a2e;
 display: flex;
 align-items: center;
 gap: 6px;
 box-shadow: 3px 3px 0 #1a1a2e;
 }

 .progress-info {
 font-size: 0.82rem;
 color: var(--muted);
 font-weight: 600;
 }

 .level-badge {
 padding: 5px 14px;
 border-radius: 50px;
 font-size: 0.8rem;
 font-weight: 800;
 border: 2px solid #1a1a2e;
 }
 .level-badge.easy { background: #d4fce8; color: #1a1a2e; }
 .level-badge.medium { background: #fff3cd; color: #1a1a2e; }
 .level-badge.hard { background: #fde8e8; color: #1a1a2e; }

 /* PROGRESS BAR */
 .progress-bar {
 background: #eee;
 border-radius: 50px;
 height: 10px;
 margin-bottom: 22px;
 overflow: hidden;
 border: 2px solid #1a1a2e;
 }
 .progress-fill {
 height: 100%;
 border-radius: 50px;
 background: #ffd93d;
 transition: width 0.4s ease;
 }

 /* QUESTION */
 .question-number {
 font-size: 0.78rem;
 color: var(--muted);
 margin-bottom: 10px;
 font-weight: 700;
 text-transform: uppercase;
 letter-spacing: 0.06em;
 }
 .question-text {
 font-weight: 800;
 font-size: clamp(1.2rem, 3.5vw, 1.5rem);
 line-height: 1.5;
 margin-bottom: 26px;
 color: #1a1a2e;
 }

 /* ANSWERS */
 .answers-grid {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 10px;
 }

 @media (max-width: 500px) {
 .answers-grid { grid-template-columns: 1fr; }
 .level-grid { grid-template-columns: 1fr; }
 }

 .answer-btn {
 background: #fff;
 border: 2px solid #1a1a2e;
 border-radius: 12px;
 padding: 15px 16px;
 cursor: pointer;
 text-align: right;
 color: #1a1a2e;
 font-family: 'Heebo', sans-serif;
 font-size: 0.95rem;
 font-weight: 700;
 transition: all 0.15s;
 display: flex;
 align-items: center;
 gap: 10px;
 box-shadow: 3px 3px 0 #1a1a2e;
 line-height: 1.4;
 }
 .answer-btn:hover:not(:disabled) {
 background: #f5f5ff;
 transform: translate(-1px,-1px);
 box-shadow: 4px 4px 0 #1a1a2e;
 }
 .answer-btn:active:not(:disabled) {
 transform: translate(1px,1px);
 box-shadow: 2px 2px 0 #1a1a2e;
 }
 .answer-btn.correct {
 background: #d4fce8;
 border-color: #2ecc71;
 box-shadow: 3px 3px 0 #2ecc71;
 animation: correctPulse 0.4s ease;
 }
 .answer-btn.wrong {
 background: #fde8e8;
 border-color: #e74c3c;
 box-shadow: 3px 3px 0 #e74c3c;
 animation: shake 0.35s ease;
 }
 .answer-btn.reveal-correct {
 background: #d4fce8;
 border-color: #2ecc71;
 box-shadow: 3px 3px 0 #2ecc71;
 }

 .answer-letter {
 width: 30px;
 height: 30px;
 border-radius: 8px;
 background: #ffd93d;
 border: 2px solid #1a1a2e;
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 0.82rem;
 font-weight: 900;
 flex-shrink: 0;
 color: #1a1a2e;
 }

 @keyframes correctPulse {
 0% { transform: scale(1); }
 40% { transform: scale(1.03); }
 100% { transform: scale(1); }
 }
 @keyframes shake {
 0%,100% { transform: translateX(0); }
 25% { transform: translateX(-5px); }
 75% { transform: translateX(5px); }
 }

 /* FEEDBACK POPUP */
 .feedback-overlay {
 position: fixed;
 top: 0; left: 0;
 width: 100%; height: 100%;
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 100;
 pointer-events: none;
 opacity: 0;
 background: rgba(0,0,0,0.35);
 transition: opacity 0.2s;
 }
 .feedback-overlay.show { opacity: 1; }

 .feedback-popup {
 background: #fff;
 border: 3px solid #1a1a2e;
 border-radius: 20px;
 padding: 30px 36px;
 text-align: center;
 max-width: 320px;
 width: 90%;
 box-shadow: 8px 8px 0 #1a1a2e;
 animation: popIn 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
 }
 @keyframes popIn {
 from { transform: scale(0.8) rotate(-3deg); opacity: 0; }
 to { transform: scale(1) rotate(0deg); opacity: 1; }
 }
 .feedback-icon { font-size: 3rem; display: block; margin-bottom: 10px; }
 .feedback-title { font-weight: 900; font-size: 1.5rem; color: #1a1a2e; }
 .feedback-points { font-size: 1.1rem; color: #f39c12; margin-top: 6px; font-weight: 800; }
 .feedback-explanation { font-size: 0.85rem; color: var(--muted); margin-top: 10px; line-height: 1.6; font-weight: 500; }

 /* NEXT BTN */
 .next-btn {
 width: 100%;
 margin-top: 18px;
 padding: 15px;
 border: 2.5px solid #1a1a2e;
 border-radius: 12px;
 background: #ffd93d;
 color: #1a1a2e;
 font-family: 'Heebo', sans-serif;
 font-size: 1rem;
 font-weight: 900;
 cursor: pointer;
 transition: all 0.15s;
 display: none;
 box-shadow: 4px 4px 0 #1a1a2e;
 }
 .next-btn.show { display: block; animation: fadeIn 0.25s ease; }
 .next-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; }
 .next-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; }

 /* RESULTS */
 .results-screen .big-score { text-align: center; padding: 16px; }
 .big-score .number {
 font-weight: 900;
 font-size: 5.5rem;
 color: #1a1a2e;
 line-height: 1;
 letter-spacing: -3px;
 text-shadow: 5px 5px 0 #ffd93d;
 }
 .big-score .label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
 .result-emoji { font-size: 3.5rem; display: block; margin: 16px 0 8px; text-align: center; }
 .result-msg { text-align: center; font-weight: 900; font-size: 1.5rem; margin-bottom: 6px; color: #1a1a2e; }
 .result-sub { text-align: center; color: var(--muted); font-size: 0.9rem; font-weight: 500; }

 .results-stats {
 display: grid;
 grid-template-columns: repeat(3,1fr);
 gap: 10px;
 margin: 22px 0;
 text-align: center;
 }
 .stat-box {
 background: #fff;
 border: 2px solid #1a1a2e;
 border-radius: 12px;
 padding: 14px 8px;
 box-shadow: 3px 3px 0 #1a1a2e;
 }
 .stat-box .n { font-weight: 900; font-size: 1.8rem; color: #1a1a2e; }
 .stat-box .l { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-weight: 600; }

 .btn-primary {
 width: 100%;
 padding: 15px;
 border: 2.5px solid #1a1a2e;
 border-radius: 12px;
 background: #ffd93d;
 color: #1a1a2e;
 font-family: 'Heebo', sans-serif;
 font-size: 1rem;
 font-weight: 900;
 cursor: pointer;
 transition: all 0.15s;
 margin-bottom: 10px;
 box-shadow: 4px 4px 0 #1a1a2e;
 }
 .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #1a1a2e; }
 .btn-primary:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #1a1a2e; }

 .btn-secondary {
 width: 100%;
 padding: 13px;
 border: 2px solid #ccc;
 border-radius: 12px;
 background: #fff;
 color: #1a1a2e;
 font-family: 'Heebo', sans-serif;
 font-size: 0.95rem;
 font-weight: 700;
 cursor: pointer;
 transition: all 0.15s;
 margin-bottom: 10px;
 }
 .btn-secondary:hover { border-color: #1a1a2e; background: #f9f9f9; }

 /* ADMIN LINK */
 .admin-link { text-align: center; margin-top: 28px; padding-bottom: 20px; }
 .admin-link button {
 background: none;
 border: none;
 color: #ccc;
 cursor: pointer;
 font-size: 0.72rem;
 font-family: 'Heebo', sans-serif;
 }
 .admin-link button:hover { color: #999; }

 /* ADMIN PANEL */
 .form-group { margin-bottom: 16px; }
 .form-group label {
 display: block;
 font-size: 0.8rem;
 color: var(--muted);
 margin-bottom: 7px;
 font-weight: 700;
 text-transform: uppercase;
 letter-spacing: 0.05em;
 }
 .form-group input, .form-group select, .form-group textarea {
 width: 100%;
 background: #fff;
 border: 2px solid #ddd;
 border-radius: 10px;
 padding: 11px 14px;
 color: #1a1a2e;
 font-family: 'Heebo', sans-serif;
 font-size: 0.92rem;
 outline: none;
 transition: border-color 0.15s;
 direction: rtl;
 }
 .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
 border-color: #1a1a2e;
 }
 .form-group textarea { resize: vertical; min-height: 75px; }
 .form-group select option { background: #fff; }

 .answers-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
 @media (max-width: 500px) { .answers-inputs { grid-template-columns: 1fr; } }

 .correct-select { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
 .correct-select label {
 display: flex;
 align-items: center;
 gap: 6px;
 background: #fff;
 border: 2px solid #ddd;
 border-radius: 8px;
 padding: 8px 14px;
 cursor: pointer;
 font-size: 0.88rem;
 color: #1a1a2e;
 font-weight: 700;
 transition: border-color 0.15s;
 }
 .correct-select label:hover { border-color: #1a1a2e; }
 .correct-select input[type="radio"] { accent-color: #ffd93d; }

 .success-toast {
 position: fixed;
 bottom: 28px;
 right: 50%;
 transform: translateX(50%);
 background: #2ecc71;
 color: #fff;
 padding: 12px 24px;
 border-radius: 50px;
 font-weight: 800;
 font-family: 'Heebo', sans-serif;
 font-size: 0.9rem;
 z-index: 999;
 border: 2px solid #1a1a2e;
 box-shadow: 4px 4px 0 #1a1a2e;
 display: none;
 }

 .questions-list { max-height: 320px; overflow-y: auto; padding-right: 3px; }
 .q-item {
 background: #fff;
 border: 2px solid #eee;
 border-radius: 10px;
 padding: 11px 14px;
 margin-bottom: 8px;
 display: flex;
 justify-content: space-between;
 align-items: flex-start;
 gap: 10px;
 }
 .q-item .q-text { font-size: 0.88rem; flex: 1; line-height: 1.4; font-weight: 600; color: #1a1a2e; }
 .q-item .q-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
 .del-btn {
 background: #fff;
 border: 2px solid #ddd;
 border-radius: 7px;
 color: #999;
 padding: 4px 10px;
 cursor: pointer;
 font-size: 0.78rem;
 font-family: 'Heebo', sans-serif;
 flex-shrink: 0;
 font-weight: 700;
 transition: all 0.15s;
 }
 .del-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fde8e8; }

 .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 0; }
 .tab-btn {
 padding: 9px 16px;
 border: none;
 border-bottom: 3px solid transparent;
 background: transparent;
 color: var(--muted);
 cursor: pointer;
 font-family: 'Heebo', sans-serif;
 font-size: 0.9rem;
 font-weight: 700;
 transition: all 0.15s;
 margin-bottom: -2px;
 }
 .tab-btn.active { color: #1a1a2e; border-bottom-color: #ffd93d; }
 .tab-btn:hover { color: #1a1a2e; }

 /* CONFETTI */
 .confetti-piece {
 position: fixed;
 width: 9px; height: 9px;
 top: -10px;
 border-radius: 2px;
 animation: confettiFall linear forwards;
 pointer-events: none;
 z-index: 200;
 }
 @keyframes confettiFall {
 to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
 }

 .points-pop {
 position: fixed;
 font-weight: 900;
 font-size: 2rem;
 color: #f39c12;
 pointer-events: none;
 z-index: 150;
 animation: pointsPop 0.9s ease forwards;
 -webkit-text-stroke: 1px #1a1a2e;
 }
 @keyframes pointsPop {
 0% { opacity: 0; transform: translateY(0) scale(0.6); }
 30% { opacity: 1; transform: translateY(-18px) scale(1.15); }
 100% { opacity: 0; transform: translateY(-70px) scale(1); }
 }

 ::-webkit-scrollbar { width: 4px; }
 ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
 <!-- HOME SCREEN -->
 <div class="screen active" id="screen-home">
 <div class="logo">
 <h1><span class="highlight">חידון</span> הידע</h1>
 <p class="subtitle">20 שאלות • 3 רמות קושי</p>
 </div>

 <div class="card">
 <h2 style="font-weight:900; font-size:1.4rem; text-align:center; margin-bottom:5px;">בחר רמת קושי </h2>
 <p style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.9rem; margin-bottom:5px;">20 שאלות מאתגרות מחכות לך!</p>

 <div class="level-grid">
 <button class="level-btn easy" onclick="startGame('easy')">
 <span class="level-icon"></span>
 <span class="level-name">קל</span>
 <span class="level-desc">מושלם למתחילים</span>
 </button>
 <button class="level-btn medium" onclick="startGame('medium')">
 <span class="level-icon"></span>
 <span class="level-name">בינוני</span>
 <span class="level-desc">לאלה שיודעים</span>
 </button>
 <button class="level-btn hard" onclick="startGame('hard')">
 <span class="level-icon"></span>
 <span class="level-name">קשה</span>
 <span class="level-desc">לגאונים בלבד!</span>
 </button>
 </div>
 </div>

 <div class="admin-link">
 <button onclick="showAdminLogin()">️ ניהול</button>
 </div>
 </div>

 <!-- GAME SCREEN -->
 <div class="screen" id="screen-game">
 <div class="logo">
 <h1 style="font-size:1.5rem;"><span class="highlight">חידון</span> הידע</h1>
 </div>

 <div class="game-header">
 <div class="score-badge"><span id="score-display">0</span></div>
 <span class="level-badge" id="level-badge">קל</span>
 <span class="progress-info" id="progress-info">שאלה 1 מתוך 20</span>
 </div>

 <div class="progress-bar">
 <div class="progress-fill" id="progress-fill" style="width:0%"></div>
 </div>

 <div class="card" id="question-card">
 <div class="question-number" id="q-number">שאלה 1</div>
 <div class="question-text" id="q-text">...טוען</div>
 <div class="answers-grid" id="answers-grid"></div>
 <button class="next-btn" id="next-btn" onclick="nextQuestion()">שאלה הבאה ←</button>
 </div>
 </div>

 <!-- RESULTS SCREEN -->
 <div class="screen" id="screen-results">
 <div class="logo">
 <h1 style="font-size:1.5rem;"><span class="highlight">תוצאות</span></h1>
 </div>
 <div class="card results-screen">
 <div class="big-score">
 <div class="number" id="final-score">0</div>
 <div class="label">נקודות</div>
 </div>
 <span class="result-emoji" id="result-emoji"></span>
 <div class="result-msg" id="result-msg">כל הכבוד!</div>
 <div class="result-sub" id="result-sub">תוצאה מעולה</div>

 <div class="results-stats">
 <div class="stat-box">
 <div class="n" id="stat-correct">0</div>
 <div class="l"> נכון</div>
 </div>
 <div class="stat-box">
 <div class="n" id="stat-wrong">0</div>
 <div class="l"> שגוי</div>
 </div>
 <div class="stat-box">
 <div class="n" id="stat-pct">0%</div>
 <div class="l"> דיוק</div>
 </div>
 </div>

 <button class="btn-primary" onclick="startGame(currentLevel)"> שחק שוב</button>
 <button class="btn-secondary" onclick="showScreen('screen-home')"> בחר רמה</button>
 </div>
 </div>

<!-- ADMIN LOGIN -->
<div class="screen" id="screen-admin-login">
  <div class="logo">
    <h1 style="font-size:1.5rem;">כניסת מנהל </h1>
  </div>
  <div class="card">
    <div class="form-group">
      <label>סיסמה</label>
      <input type="password" id="admin-pw" placeholder="הכנס סיסמה..." onkeyup="if(event.key==='Enter')checkAdminLogin()">
    </div>
    <button class="btn-primary" onclick="checkAdminLogin()">כניסה</button>
    <button class="btn-secondary" onclick="showScreen('screen-home')">חזרה</button>
  </div>
</div>


<!-- ADMIN PANEL -->
<div class="screen" id="screen-admin">
  <div class="logo">
    <h1 style="font-size:1.5rem;">פאנל ניהול ️</h1>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="showAdminTab('add')"> הוסף שאלה</button>
      <button class="tab-btn" onclick="showAdminTab('list')"> רשימת שאלות</button>
    </div>

    <!-- ADD QUESTION -->
    <div id="tab-add">
      <div class="form-group">
        <label>רמת קושי</label>
        <select id="q-level">
          <option value="easy"> קל</option>
          <option value="medium"> בינוני</option>
          <option value="hard"> קשה</option>
        </select>
      </div>
      <div class="form-group">
        <label>השאלה</label>
        <textarea id="q-input" placeholder="כתוב את השאלה כאן..."></textarea>
      </div>
      <div class="form-group">
        <label>4 תשובות</label>
        <div class="answers-inputs">
          <input type="text" id="a1" placeholder="תשובה א">
          <input type="text" id="a2" placeholder="תשובה ב">
          <input type="text" id="a3" placeholder="תשובה ג">
          <input type="text" id="a4" placeholder="תשובה ד">
        </div>
      </div>
      <div class="form-group">
        <label>תשובה נכונה</label>
        <div class="correct-select">
          <label><input type="radio" name="correct" value="0"> א</label>
          <label><input type="radio" name="correct" value="1"> ב</label>
          <label><input type="radio" name="correct" value="2"> ג</label>
          <label><input type="radio" name="correct" value="3"> ד</label>
        </div>
      </div>
      <div class="form-group">
        <label>הסבר (אופציונלי)</label>
        <input type="text" id="q-exp" placeholder="הסבר קצר לתשובה הנכונה...">
      </div>
      <button class="btn-primary" onclick="addQuestion()"> הוסף שאלה</button>
    </div>
   <!-- Toast -->
<div class="success-toast" id="toast"> השאלה נוספה בהצלחה!</div>

    <!-- LIST QUESTIONS -->
    <div id="tab-list" style="display:none">
      <div class="form-group">
        <select id="filter-level" onchange="renderQuestionsList()">
          <option value="all">כל הרמות</option>
          <option value="easy"> קל</option>
          <option value="medium"> בינוני</option>
          <option value="hard"> קשה</option>
        </select>
      </div>
      <div class="questions-list" id="questions-list"></div>
    </div>

    <button class="btn-secondary" onclick="showScreen('screen-home')" style="margin-top:15px;"> חזרה לדף הבית</button>
  </div>
</div>


<!-- Feedback overlay -->
<div class="feedback-overlay" id="feedback-overlay">
 <div class="feedback-popup">
 <span class="feedback-icon" id="fb-icon"></span>
 <div class="feedback-title" id="fb-title">נכון!</div>
 <div class="feedback-points" id="fb-points">+100 נקודות</div>
 <div class="feedback-explanation" id="fb-exp"></div>
 </div>
</div>

<!-- Toast -->
<div class="success-toast" id="toast"> השאלה נוספה בהצלחה!</div>

<script>
// ========= GLOBALS =========
let currentLevel = '';
let questions = [];
let currentQIndex = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;

// ========= SCREEN SWITCH =========
function showScreen(screenId){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

// ========= START GAME =========
function startGame(level){
  currentLevel = level;
  questions = [...defaultQuestions[level]]; // copy questions
  currentQIndex = 0;
  score = 0;
  correctCount = 0;
  wrongCount = 0;

  document.getElementById('score-display').textContent = score;
  document.getElementById('level-badge').textContent = levelText(level);
  document.getElementById('progress-info').textContent = `שאלה 1 מתוך ${questions.length}`;
  updateProgressBar();
  showScreen('screen-game');
  renderQuestion();
}

// ========= RENDER QUESTION =========
function renderQuestion(){
  const q = questions[currentQIndex];
  document.getElementById('q-number').textContent = `שאלה ${currentQIndex+1}`;
  document.getElementById('q-text').textContent = q.q;

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.a.forEach((ans, i)=>{
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<div class="answer-letter">${String.fromCharCode(65+i)}</div>${ans}`;
    btn.onclick = ()=>checkAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('next-btn').classList.remove('show');
}

// ========= CHECK ANSWER =========
function checkAnswer(selected){
  const q = questions[currentQIndex];
  const buttons = document.querySelectorAll('.answers-grid .answer-btn');
  buttons.forEach((btn, i)=>{
    btn.disabled = true;
    if(i===q.c) btn.classList.add('correct');
    if(i===selected && i!==q.c) btn.classList.add('wrong');
  });

  if(selected===q.c){
    score += 10;
    correctCount++;
  } else { wrongCount++; }

  document.getElementById('score-display').textContent = score;
  showFeedback(q, selected);
  document.getElementById('next-btn').classList.add('show');
  updateProgressBar();
}

// ========= FEEDBACK POPUP =========
function showFeedback(q, selected){
  const overlay = document.getElementById('feedback-overlay');
  document.getElementById('fb-icon').textContent = selected===q.c ? '✔️' : '❌';
  document.getElementById('fb-title').textContent = selected===q.c ? 'נכון!' : 'לא נכון';
  document.getElementById('fb-points').textContent = selected===q.c ? '+10 נקודות' : '+0 נקודות';
  document.getElementById('fb-exp').textContent = q.exp;
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'), 1500);
}

// ========= NEXT QUESTION =========
function nextQuestion(){
  currentQIndex++;
  if(currentQIndex >= questions.length){
    showResults();
  } else {
    renderQuestion();
    document.getElementById('progress-info').textContent = `שאלה ${currentQIndex+1} מתוך ${questions.length}`;
  }
}

// ========= UPDATE PROGRESS BAR =========
function updateProgressBar(){
  const perc = ((currentQIndex)/questions.length)*100;
  document.getElementById('progress-fill').style.width = `${perc}%`;
}

// ========= SHOW RESULTS =========
function showResults(){
  document.getElementById('final-score').textContent = score;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-pct').textContent = `${Math.round(correctCount/questions.length*100)}%`;

  // emoji & msg
  const emoji = document.getElementById('result-emoji');
  const msg = document.getElementById('result-msg');
  const sub = document.getElementById('result-sub');
  if(score > questions.length*7){
    emoji.textContent = '🎉';
    msg.textContent = 'כל הכבוד!';
    sub.textContent = 'תוצאה מעולה';
  } else if(score > questions.length*4){
    emoji.textContent = '🙂';
    msg.textContent = 'לא רע!';
    sub.textContent = 'אפשר להשתפר';
  } else {
    emoji.textContent = '😟';
    msg.textContent = 'צריך לתרגל יותר';
    sub.textContent = 'אל תוותר!';
  }

  showScreen('screen-results');
}

// ========= HELPERS =========
function levelText(l){
  return l==='easy'?'קל':l==='medium'?'בינוני':'קשה';
}

// ========== ADMIN LOGIN =========
const adminPassword = "1234"; // לשנות בעתיד
function showAdminLogin(){ showScreen('screen-admin-login'); }
function checkAdminLogin(){
  const pw = document.getElementById('admin-pw').value;
  if(pw===adminPassword) showScreen('screen-admin');
  else alert('סיסמה שגויה!');
}

// ========== ADMIN TABS =========
function showAdminTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#tab-add,#tab-list').forEach(t=>t.style.display='none');
  document.querySelector(`.tab-btn[onclick="showAdminTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-'+tab).style.display='block';
}

// ========= ADD QUESTION =========
function addQuestion(){
  const level = document.getElementById('q-level').value;
  const qText = document.getElementById('q-input').value.trim();
  const a1 = document.getElementById('a1').value.trim();
  const a2 = document.getElementById('a2').value.trim();
  const a3 = document.getElementById('a3').value.trim();
  const a4 = document.getElementById('a4').value.trim();
  const correct = document.querySelector('input[name="correct"]:checked');
  const exp = document.getElementById('q-exp').value.trim();

  if(!qText || !a1 || !a2 || !a3 || !a4 || !correct){ alert('מלא את כל השדות'); return; }

  const newQ = { q:qText, a:[a1,a2,a3,a4], c:parseInt(correct.value), exp };
  defaultQuestions[level].push(newQ);

  // show toast
  const toast = document.getElementById('toast');
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none',2000);

  // clear inputs
  document.getElementById('q-input').value='';
  document.getElementById('a1').value='';
  document.getElementById('a2').value='';
  document.getElementById('a3').value='';
  document.getElementById('a4').value='';
  document.getElementById('q-exp').value='';
  document.querySelectorAll('input[name="correct"]').forEach(i=>i.checked=false);
  renderQuestionsList();
}

// ========= LIST QUESTIONS =========
function renderQuestionsList(){
  const filter = document.getElementById('filter-level').value;
  const listEl = document.getElementById('questions-list');
  listEl.innerHTML = '';

  let allQs = [];
  if(filter==='all'){
    allQs = [...defaultQuestions.easy, ...defaultQuestions.medium, ...defaultQuestions.hard];
  } else {
    allQs = [...defaultQuestions[filter]];
  }

  allQs.forEach((q,i)=>{
    const div = document.createElement('div');
    div.className='q-item';
    div.innerHTML = `<div class="q-text">${q.q}</div>
                     <div class="q-meta">${levelText(filter==='all'?getLevelByQuestion(q):filter)}</div>
                     <button class="del-btn" onclick="deleteQuestion('${filter==='all'?getLevelByQuestion(q):filter}',${i})">מחק</button>`;
    listEl.appendChild(div);
  });
}

function getLevelByQuestion(q){
  if(defaultQuestions.easy.includes(q)) return 'easy';
  if(defaultQuestions.medium.includes(q)) return 'medium';
  return 'hard';
}

function deleteQuestion(level,index){
  defaultQuestions[level].splice(index,1);
  renderQuestionsList();
}
</script>
</body>
</html>
